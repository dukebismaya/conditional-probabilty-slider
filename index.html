<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conditional Probability Visualizer</title>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #212121;
            color: #eeeeee;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .app-container {
            display: flex;
            background-color: #2b2b2b;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            padding: 40px;
            gap: 40px;
            width: 1000px;
            max-width: 95%;
        }
        .left-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .right-panel {
            flex: 1.2;
            background-color: #2b2b2b;
            border-left: 1px solid #444;
            padding-left: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .main-formula {
            text-align: center;
            font-size: 32px;
            margin-bottom: 50px;
        }
        .slider-row {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            font-size: 18px;
        }
        .slider-label { width: 120px; }
        .slider-val { width: 60px; text-align: right; margin-right: 15px; }
        input[type=range] {
            flex: 1;
            -webkit-appearance: none;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 18px; width: 18px;
            border-radius: 50%;
            background: #555;
            cursor: pointer;
            margin-top: -7px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px;
            cursor: pointer;
            background: #444;
            border-radius: 2px;
        }
        .calculation {
            margin-top: 30px;
            font-size: 22px;
        }
        
        /* Visualization */
        .vis-title { font-weight: bold; margin-bottom: 5px; font-size: 18px; }
        .vis-subtitle { font-size: 14px; color: #aaa; margin-bottom: 40px; }
        
        .vis-container {
            position: relative;
            width: 100%;
            height: 140px;
            background: #fff;
            border-radius: 2px;
        }
        .vis-pb {
            position: absolute;
            left: 0; top: 0; height: 100%;
            background: #e0f2fe;
            border: 2px solid #3b82f6;
            transition: width 0.1s ease-out;
        }
        .vis-pab {
            position: absolute;
            left: 0; top: 0; height: 100%;
            background: #ddd6fe;
            border-right: 1px solid #8b5cf6;
            transition: width 0.1s ease-out;
        }
        .label-pb {
            position: absolute;
            top: -28px; left: 50%;
            transform: translateX(-50%);
            color: #ddd; font-size: 14px; white-space: nowrap;
        }
        .label-pab {
            position: absolute;
            bottom: -28px; left: 50%;
            transform: translateX(-50%);
            color: #eee; font-size: 14px; white-space: nowrap;
        }
        .icon-btn { cursor: pointer; color: #aaa; margin-left: 10px; font-size: 20px;}
        .top-icons { display: flex; justify-content: flex-end; width: 100%; }
        
    </style>
</head>
<body>

    <div class="app-container">
        <div class="left-panel">
            <div class="top-icons">
                <span class="icon-btn">↺</span>
                <span class="icon-btn">⧉</span>
            </div>
            <div class="main-formula" id="main-formula"></div>
            
            <div class="slider-row">
                <div class="slider-label" id="label-pb-text"></div>
                <div class="slider-val" id="val-pb">0.74</div>
                <input type="range" id="pb" min="0.01" max="1.0" step="0.01" value="0.74">
            </div>
            
            <div class="slider-row">
                <div class="slider-label" id="label-pab-text"></div>
                <div class="slider-val" id="val-pab">0.30</div>
                <input type="range" id="pab" min="0.00" max="1.0" step="0.01" value="0.30">
            </div>

            <div class="calculation" id="calc-formula"></div>
        </div>

        <div class="right-panel">
            <div class="vis-title" id="vis-title">P(A|B) &approx; 0.41</div>
            <div class="vis-subtitle">A&cap;B is the part of B where A also happens</div>
            
            <div class="vis-container">
                <div class="vis-pb" id="box-pb" style="width: 74%;">
                    <div class="label-pb" id="box-label-pb">P(B)=0.74</div>
                    <div class="vis-pab" id="box-pab" style="width: 40.5%;">
                        <div class="label-pab" id="box-label-pab">P(A&cap;B)=0.30</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            katex.render("P(A|B) = \\frac{P(A \\cap B)}{P(B)}", document.getElementById("main-formula"));
            katex.render("P(B)", document.getElementById("label-pb-text"));
            katex.render("P(A \\cap B)", document.getElementById("label-pab-text"));

            const pbSlider = document.getElementById("pb");
            const pabSlider = document.getElementById("pab");
            
            const pbVal = document.getElementById("val-pb");
            const pabVal = document.getElementById("val-pab");
            
            const calcFormula = document.getElementById("calc-formula");
            const visTitle = document.getElementById("vis-title");
            
            const boxPb = document.getElementById("box-pb");
            const boxPab = document.getElementById("box-pab");
            const boxLabelPb = document.getElementById("box-label-pb");
            const boxLabelPab = document.getElementById("box-label-pab");

            function update() {
                let pb = parseFloat(pbSlider.value);
                let pab = parseFloat(pabSlider.value);

                // Enforce P(A ∩ B) <= P(B) -> Cannot be greater than P(B)
                if (pab > pb) {
                    pab = pb;
                    pabSlider.value = pb.toFixed(2);
                }

                pbVal.innerText = pb.toFixed(2);
                pabVal.innerText = pab.toFixed(2);

                const result = pb === 0 ? 0 : pab / pb;
                
                katex.render(`P(A|B) = \\frac{${pab.toFixed(2)}}{${pb.toFixed(2)}} \\approx ${result.toFixed(2)}`, calcFormula);
                
                visTitle.innerText = `P(A|B) ≈ ${result.toFixed(2)}`;
                
                boxPb.style.width = (pb * 100) + "%";
                boxPab.style.width = pb === 0 ? "0%" : ((pab / pb) * 100) + "%";
                
                boxLabelPb.innerText = `P(B)=${pb.toFixed(2)}`;
                boxLabelPab.innerText = `P(A∩B)=${pab.toFixed(2)}`;
            }

            pbSlider.addEventListener("input", update);
            pabSlider.addEventListener("input", update);
            
            update();
        });
    </script>
</body>
</html>
